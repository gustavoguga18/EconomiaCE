<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Economiace</title>
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Animate.css -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <!-- CSS personalizado -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="container py-4">

  <!-- Título -->
  <h1 class="text-center mb-4 animate__animated animate__fadeInDown">Economiace</h1>

  <!-- Botão Dark Mode -->
  <button id="btnDarkMode" class="btn btn-secondary mb-4">
    <span id="iconDarkMode">🌙</span>
  </button>

  <!-- Orçamento inicial -->
  <div class="mb-3">
    <label for="orcamento" class="form-label">Orçamento inicial (R$)</label>
    <input type="number" id="orcamento" class="form-control" placeholder="Digite seu orçamento">
    <button id="btnOrcamento" class="btn btn-success mt-2">Definir Orçamento</button>
  </div>

  <!-- Saldo -->
  <div id="saldo" class="saldo-card text-center mb-4">Saldo: R$0,00</div>

  <!-- Formulário de produto -->
  <div class="card p-3 mb-4">
    <h5>Adicionar Produto</h5>
    <input type="text" id="nome" class="form-control mb-2" placeholder="Nome do produto">
    <input type="text" id="marca" class="form-control mb-2" placeholder="Marca">
    <input type="number" id="valor" class="form-control mb-2" placeholder="Valor (R$)">
    <input type="number" id="quantidade" class="form-control mb-2" placeholder="Quantidade">
    <button id="btnAdicionar" class="btn btn-primary">Adicionar</button>
    <button id="btnScanner" class="btn btn-secondary mt-2">Escanear Código de Barras</button>
  </div>

  <!-- Tabela de produtos -->
  <h4>Produtos</h4>
  <div class="table-responsive">
    <table id="tabelaProdutos" class="table table-striped table-bordered mt-3">
      <thead class="table-light">
        <tr>
          <th>Produto</th>
          <th>Marca</th>
          <th>Valor (R$)</th>
          <th>Quantidade</th>
          <th>Total (R$)</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- Nome do mercantil -->
  <input type="text" id="mercantil" class="form-control mt-3" placeholder="Nome do mercantil">

  <!-- Botões -->
  <button id="btnPDF" class="btn btn-primary mt-3">📄 Gerar PDF</button>
  <button id="btnLimpar" class="btn btn-danger mt-3">🧹 Limpar Tudo</button>

  <!-- Scanner -->
  <div id="scanner" class="mt-4" style="display:none;">
    <h5>Scanner de Código de Barras</h5>
    <div id="scanner-container" style="width:100%; height:300px; background:#000;"></div>
    <button id="btnPararScanner" class="btn btn-danger mt-2">Parar Scanner</button>
  </div>

  <!-- Container de Toasts -->
  <div id="toast-container"></div>

  <!-- Bibliotecas externas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

  <!-- Script principal -->
  <script type="module" src="script.js"></script>

</body>
</html>
